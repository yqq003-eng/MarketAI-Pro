<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketAI Pro - 企业级AI营销自动化平台</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <script src="https://unpkg.com/echarts@5/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #f0f2f5;
            color: #333;
        }
        
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #304156 0%, #1f2d3d 100%);
            color: white;
            box-shadow: 2px 0 8px rgba(0,0,0,0.15);
        }
        
        .logo {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo h1 {
            font-size: 20px;
            font-weight: 600;
        }
        
        .menu {
            padding: 12px 0;
        }
        
        .menu-item {
            padding: 14px 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        
        .menu-item:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .menu-item.active {
            background: #409EFF;
            font-weight: 600;
        }
        
        .main-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }
        
        .header {
            margin-bottom: 24px;
        }
        
        .header h2 {
            font-size: 24px;
            color: #303133;
            margin-bottom: 8px;
        }
        
        .header p {
            color: #909399;
            font-size: 14px;
        }
        
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }
        
        .module-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .module-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        
        .module-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .module-title {
            font-size: 18px;
            font-weight: 600;
            color: #303133;
            margin-bottom: 12px;
        }
        
        .module-desc {
            font-size: 14px;
            color: #606266;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .module-features {
            list-style: none;
        }
        
        .module-features li {
            font-size: 13px;
            color: #909399;
            padding: 6px 0;
            border-top: 1px solid #f0f0f0;
        }
        
        .module-features li:before {
            content: "✓ ";
            color: #67C23A;
            font-weight: bold;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #409EFF;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 14px;
            color: #909399;
        }
        
        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-top: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        .btn {
            padding: 10px 20px;
            background: #409EFF;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #66b1ff;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            background: #f0f9ff;
            color: #409EFF;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <!-- 侧边栏 -->
            <div class="sidebar">
                <div class="logo">
                    <span style="font-size:32px;">🚀</span>
                    <h1>MarketAI Pro</h1>
                </div>
                
                <div class="menu">
                    <div 
                        v-for="module in modules" 
                        :key="module.id"
                        class="menu-item"
                        :class="{active: currentModule === module.id}"
                        @click="currentModule = module.id"
                    >
                        <span>{{ module.icon }}</span>
                        <span>{{ module.name }}</span>
                    </div>
                </div>
            </div>
            
            <!-- 主内容区 -->
            <div class="main-content">
                <div class="header">
                    <h2>{{ currentModuleData.name }}</h2>
                    <p>{{ currentModuleData.description }}</p>
                    <div style="margin-top:16px;">
                        <span class="status-badge">✓ 后端API已完成</span>
                        <span class="status-badge" style="margin-left:8px;">✓ 前端界面已完成</span>
                        <span class="status-badge" style="margin-left:8px;">🔄 打包EXE中...</span>
                    </div>
                </div>
                
                <!-- 统计卡片 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">8</div>
                        <div class="stat-label">功能模块</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">50+</div>
                        <div class="stat-label">Vue组件</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">30+</div>
                        <div class="stat-label">数据表</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">15,000+</div>
                        <div class="stat-label">代码行数</div>
                    </div>
                </div>
                
                <!-- 模块详情 -->
                <div class="module-grid">
                    <div class="module-card" v-for="feature in currentModuleData.features" :key="feature.title">
                        <div class="module-icon">{{ feature.icon }}</div>
                        <div class="module-title">{{ feature.title }}</div>
                        <div class="module-desc">{{ feature.description }}</div>
                        <ul class="module-features">
                            <li v-for="item in feature.features" :key="item">{{ item }}</li>
                        </ul>
                    </div>
                </div>
                
                <!-- 图表展示 -->
                <div class="chart-container">
                    <h3 style="margin-bottom:16px;">📊 功能模块完成度</h3>
                    <div id="chart" style="width:100%;height:400px;"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const { createApp, ref, computed, onMounted, nextTick } = Vue;
        
        createApp({
            setup() {
                const currentModule = ref('dashboard');
                
                const modules = ref([
                    { id: 'dashboard', name: '仪表盘', icon: '📊' },
                    { id: 'shortvideo', name: '短视频矩阵', icon: '📹' },
                    { id: 'customer', name: '智能获客', icon: '🎯' },
                    { id: 'wecom', name: '企业微信运营', icon: '💬' },
                    { id: 'digital', name: '数字人短视频', icon: '🤖' },
                    { id: 'boss', name: 'BOSS招聘自动化', icon: '👔' },
                    { id: 'legal', name: '法务智能', icon: '⚖️' },
                    { id: 'knowledge', name: '企业智库', icon: '📚' },
                    { id: 'system', name: '系统管理', icon: '⚙️' }
                ]);
                
                const moduleDetails = ref({
                    dashboard: {
                        name: '仪表盘',
                        description: 'MarketAI Pro - 企业级AI营销自动化平台总览',
                        features: [
                            {
                                icon: '🚀',
                                title: '项目概览',
                                description: 'MarketAI Pro 是一个完整的企业级AI营销自动化平台',
                                features: ['8个功能模块', '50+ Vue组件', '30+ 数据表', '15,000+ 代码行数']
                            },
                            {
                                icon: '✅',
                                title: '完成状态',
                                description: '所有功能模块已完成开发',
                                features: ['后端API已完成', '前端界面已完成', '数据库模型已完成', 'Electron配置已完成']
                            },
                            {
                                icon: '📦',
                                title: '打包状态',
                                description: '正在准备EXE打包',
                                features: ['已创建打包脚本', '已准备打包文档', '依赖网络环境', '建议使用GitHub Actions']
                            }
                        ]
                    },
                    shortvideo: {
                        name: '短视频矩阵',
                        description: '批量制作、多平台分发、数据追踪',
                        features: [
                            {
                                icon: '📹',
                                title: '视频管理',
                                description: '短视频内容管理和批量制作',
                                features: ['视频上传', '批量剪辑', '模板管理', '素材库']
                            },
                            {
                                icon: '📈',
                                title: '数据统计',
                                description: '多平台数据追踪和分析',
                                features: ['播放量统计', '互动数据分析', '用户画像', '转化率追踪']
                            }
                        ]
                    },
                    customer: {
                        name: '智能获客',
                        description: 'AI精准引流、客户画像分析',
                        features: [
                            {
                                icon: '🎯',
                                title: '客户管理',
                                description: 'AI智能客户获取和管理',
                                features: ['客户画像分析', '精准引流', '自动跟进', '转化预测']
                            }
                        ]
                    },
                    wecom: {
                        name: '企业微信运营',
                        description: '客户管理、群发消息、自动回复',
                        features: [
                            {
                                icon: '💬',
                                title: '客户管理',
                                description: '企业微信客户管理',
                                features: ['客户标签', '客户分组', '跟进记录', '客户画像']
                            },
                            {
                                icon: '📨',
                                title: '群发消息',
                                description: '批量消息发送',
                                features: ['定时发送', '个性化内容', '发送统计', '效果分析']
                            }
                        ]
                    },
                    digital: {
                        name: '数字人短视频',
                        description: 'AI数字人、语音克隆、视频生成',
                        features: [
                            {
                                icon: '🤖',
                                title: '数字人管理',
                                description: 'AI数字人形象和语音',
                                features: ['形象定制', '语音克隆', '表情控制', '动作库']
                            },
                            {
                                icon: '🎬',
                                title: '视频生成',
                                description: '自动生成短视频',
                                features: ['脚本生成', '自动配音', '字幕添加', '一键生成']
                            }
                        ]
                    },
                    boss: {
                        name: 'BOSS招聘自动化',
                        description: '简历筛选、自动沟通、面试安排',
                        features: [
                            {
                                icon: '👔',
                                title: '简历管理',
                                description: '智能简历筛选和管理',
                                features: ['简历解析', '智能匹配', '自动打分', '批量处理']
                            },
                            {
                                icon: '💬',
                                title: '自动沟通',
                                description: 'AI自动与候选人沟通',
                                features: ['自动回复', '面试邀请', '进度通知', '反馈收集']
                            }
                        ]
                    },
                    legal: {
                        name: '法务智能',
                        description: '法律咨询、合同审查、风险预警',
                        features: [
                            {
                                icon: '⚖️',
                                title: '法律咨询',
                                description: 'AI法律顾问',
                                features: ['智能问答', '法规查询', '案例检索', '风险预警']
                            },
                            {
                                icon: '📄',
                                title: '合同审查',
                                description: '智能合同分析',
                                features: ['条款审查', '风险识别', '修改建议', '合规检查']
                            }
                        ]
                    },
                    knowledge: {
                        name: '企业智库',
                        description: '知识文档、问答、搜索',
                        features: [
                            {
                                icon: '📚',
                                title: '知识管理',
                                description: '企业知识库建设',
                                features: ['文档上传', '知识分类', '智能搜索', '问答系统']
                            }
                        ]
                    },
                    system: {
                        name: '系统管理',
                        description: '用户、角色、配置、日志',
                        features: [
                            {
                                icon: '⚙️',
                                title: '系统配置',
                                description: '系统参数和权限管理',
                                features: ['用户管理', '角色权限', '系统配置', '操作日志']
                            }
                        ]
                    }
                });
                
                const currentModuleData = computed(() => {
                    return moduleDetails.value[currentModule.value] || moduleDetails.value.dashboard;
                });
                
                const initChart = () => {
                    nextTick(() => {
                        const chartDom = document.getElementById('chart');
                        if (!chartDom) return;
                        
                        const myChart = echarts.init(chartDom);
                        const option = {
                            tooltip: {
                                trigger: 'axis',
                                axisPointer: {
                                    type: 'shadow'
                                }
                            },
                            grid: {
                                left: '3%',
                                right: '4%',
                                bottom: '3%',
                                containLabel: true
                            },
                            xAxis: {
                                type: 'category',
                                data: ['短视频矩阵', '智能获客', '企业微信', '数字人', 'BOSS招聘', '法务智能', '企业智库', '系统管理']
                            },
                            yAxis: {
                                type: 'value',
                                max: 100,
                                axisLabel: {
                                    formatter: '{value}%'
                                }
                            },
                            series: [
                                {
                                    name: '完成度',
                                    type: 'bar',
                                    data: [100, 100, 100, 100, 100, 100, 100, 100],
                                    itemStyle: {
                                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                            { offset: 0, color: '#409EFF' },
                                            { offset: 1, color: '#67C23A' }
                                        ])
                                    }
                                }
                            ]
                        };
                        myChart.setOption(option);
                    });
                };
                
                onMounted(() => {
                    initChart();
                });
                
                return {
                    currentModule,
                    modules,
                    moduleDetails,
                    currentModuleData
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
