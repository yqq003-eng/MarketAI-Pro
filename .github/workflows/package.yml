name: Package MarketAI Pro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: MarketAI-Pro-v1.0.0-Complete
          path: .
          retention-days: 30
