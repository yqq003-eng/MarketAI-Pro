name: Build Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Check electron-builder installation
        run: |
          dir node_modules\.bin\ | findstr /i electron || echo "No electron-builder in .bin"
          npm list electron-builder || echo "electron-builder not installed"
        continue-on-error: true

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm install --legacy-peer-deps

      - name: Build Vue frontend
        working-directory: src/frontend
        run: npm run build

      - name: List frontend dist contents
        run: dir src\frontend\dist

      - name: Copy frontend build to dist
        run: |
          if (!(Test-Path dist)) { New-Item -ItemType Directory -Path dist -Force }
          Copy-Item -Path "src\frontend\dist\*" -Destination "dist\" -Recurse -Force
          Write-Host "Copied frontend build to dist/"

      - name: List dist contents
        run: dir dist

      - name: Build Electron app (using npx)
        run: npx electron-builder --publish=never

      - name: List dist_electron contents
        run: dir dist_electron

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarketAI-Pro-Setup-v1.0.0
          path: dist_electron/*Setup*.exe
          retention-days: 30
        if: always()
