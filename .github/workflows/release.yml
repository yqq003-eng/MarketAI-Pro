name: Build Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Vue frontend
        run: npm run build:vue

      - name: Build Electron app
        run: npm run build:electron

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarketAI-Pro-Setup-v1.0.0
          path: dist_electron/*Setup*.exe
          retention-days: 30

      - name: Upload portable artifact (if available)
        uses: actions/upload-artifact@v4
        with:
          name: MarketAI-Pro-Portable-v1.0.0
          path: dist_electron/*Portable*.exe
          retention-days: 30
        continue-on-error: true
