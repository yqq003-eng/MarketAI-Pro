name: Build Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Verify electron-builder installation
        run: |
          dir node_modules\.bin\electron-builder.cmd
          .\node_modules\.bin\electron-builder --version
        continue-on-error: true

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm install --legacy-peer-deps

      - name: Build Vue frontend
        working-directory: src/frontend
        run: npm run build

      - name: Copy frontend build to dist
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item -Path "src\frontend\dist\*" -Destination "dist\" -Recurse -Force

      - name: Build Electron app
        run: .\node_modules\.bin\electron-builder.cmd --publish=never
        timeout-minutes: 10

      - name: List dist_electron contents
        run: dir dist_electron

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarketAI-Pro-Setup
          path: dist_electron/*Setup*.exe
          retention-days: 30
        if: always()
